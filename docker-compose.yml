services:
  swap.api:
    image: ${DOCKER_REGISTRY-}swapapi
    build:
      context: .
      dockerfile: src/Swap.API/Dockerfile
    ports:
      - 5000:8080
      - 5001:8081
    environment:
          # Seq
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://swap.seq:5341/ingest/otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf

  swap.database:
    image: postgres:17
    container_name: Swap.Database
    environment:
      - POSTGRES_DB=swap
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/db:/var/lib/postgresql/data
    ports:
      - 5432:5432

  swap.seq:
    image: datalust/seq:2024.3 # or latest
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - ./.containers/seq_data:/data
    ports:
      - 8080:80
      - 5341:5341

  swap.identity:
      image: quay.io/keycloak/keycloak:24.0.0
      container_name: Swap.Identity
      command: start-dev --import-realm
      environment:
        - KC_HEALTH_ENABLED=true
        - KEYCLOAK_ADMIN=admin
        - KEYCLOAK_ADMIN_PASSWORD=admin
        - KC_HOSTNAME=swap.identity
        - KC_HOSTNAME_PORT=8080
        - KC_HOSTNAME_STRICT=false
        - KC_HTTP_ENABLED=true
      volumes:
        - ./.containers/identity:/opt/keycloak/data
        - ./.files:/opt/keycloak/data/import
      ports:
        - 18080:8080